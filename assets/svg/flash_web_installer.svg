<svg xmlns="http://www.w3.org/2000/svg" width="420" height="68" viewBox="0 0 420 68">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#2c2c2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF5500"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="68" rx="12" fill="url(#bg)"/>

  <!-- Orange left accent bar -->
  <rect width="4" height="68" rx="2" fill="url(#accent)"/>

  <!-- Orange glow circle behind icon -->
  <circle cx="46" cy="34" r="22" fill="rgba(255,110,0,0.12)"/>

  <!-- Lightning bolt / flash icon (Feather-style, 24×24, centered at 46,34) -->
  <g transform="translate(34 22)">
    <path fill="none" stroke="#FF6B00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
  </g>

  <!-- Divider -->
  <line x1="82" y1="14" x2="82" y2="54" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <!-- "OPEN WEB INSTALLER" small label -->
  <text x="212" y="26"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" font-weight="500"
        fill="rgba(255,255,255,0.42)"
        text-anchor="middle" letter-spacing="1.8">OPEN WEB INSTALLER</text>

  <!-- Main text -->
  <text x="212" y="50"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="21" font-weight="700"
        fill="white"
        text-anchor="middle" letter-spacing="-0.3">Flash your ESP32 — no tools needed</text>

  <!-- Chrome · Edge pill -->
  <rect x="327" y="20" width="68" height="26" rx="6" fill="rgba(255,255,255,0.07)"/>
  <text x="361" y="37"
        font-family="'SF Mono','Fira Code',monospace"
        font-size="10.5" font-weight="600"
        fill="rgba(255,255,255,0.50)"
        text-anchor="middle">Chrome · Edge</text>

  <!-- External link arrow -->
  <g transform="translate(405 26)" fill="rgba(255,255,255,0.40)">
    <path d="M3 1h12v12M14 1L5 10" stroke="rgba(255,255,255,0.40)" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
