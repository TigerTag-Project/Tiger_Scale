name: Build firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Cache PlatformIO toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Build firmware
        run: pio run

      - name: Build LittleFS image
        run: pio run -t buildfs

      - name: Show binary sizes
        run: |
          ls -la .pio/build/esp32dev/firmware.bin .pio/build/esp32dev/littlefs.bin
          echo "Flash usage :"
          pio run --silent 2>&1 | grep -E "RAM:|Flash:" || true

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tigerscale-firmware-${{ github.sha }}
          path: |
            .pio/build/esp32dev/firmware.bin
            .pio/build/esp32dev/littlefs.bin
            .pio/build/esp32dev/bootloader.bin
            .pio/build/esp32dev/partitions.bin
          retention-days: 30
