name: Deploy Web Installer

# Auto-build firmware and publish the Web Installer (web-installer/) to GitHub Pages
# every time main is updated. Binaries are NEVER committed to the repo — they live
# only in the deployed Pages artifact.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Don't queue overlapping deploys — newer commit cancels older runs in flight
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Cache PlatformIO toolchain
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Build firmware
        run: pio run

      - name: Build LittleFS image
        run: pio run -t buildfs

      - name: Stage binaries for the Web Installer
        run: |
          mkdir -p web-installer/firmware
          cp .pio/build/esp32dev/firmware.bin    web-installer/firmware/
          cp .pio/build/esp32dev/bootloader.bin  web-installer/firmware/
          cp .pio/build/esp32dev/partitions.bin  web-installer/firmware/
          cp .pio/build/esp32dev/littlefs.bin    web-installer/firmware/
          # boot_app0.bin is provided by the Arduino-ESP32 framework, copy from cache
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
             web-installer/firmware/
          echo "── Binaries staged ──"
          ls -la web-installer/firmware/

      - name: Generate version manifest
        run: |
          # Provide a small JSON the firmware can fetch to compare versions for OTA
          GIT_SHA=$(git rev-parse --short HEAD)
          GIT_DATE=$(git show -s --format=%cI HEAD)
          FW_SHA=$(sha256sum web-installer/firmware/firmware.bin | cut -d' ' -f1)
          FS_SHA=$(sha256sum web-installer/firmware/littlefs.bin | cut -d' ' -f1)
          cat > web-installer/version.json <<EOF
          {
            "version":      "2.0.0",
            "git_sha":      "$GIT_SHA",
            "git_date":     "$GIT_DATE",
            "firmware_sha": "$FW_SHA",
            "littlefs_sha": "$FS_SHA",
            "firmware_url": "https://tigertag-project.github.io/TigerScale/firmware/firmware.bin",
            "littlefs_url": "https://tigertag-project.github.io/TigerScale/firmware/littlefs.bin"
          }
          EOF
          cat web-installer/version.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-installer

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
